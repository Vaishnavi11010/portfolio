<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

<header>
    <h1>Contact Me</h1>

    <nav>
        <a href="index.html">About Me</a>
        <a href="skills.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="container">

    <h2>Contact Me</h2>

    <div class="about-box">

        <p><strong>Email:</strong> yourname@example.com</p>

        <p><strong>Education:</strong> MCA Student</p>

        <p><strong>Location:</strong> Pune, Maharashtra</p>

        <p>
            Feel free to contact me regarding internships,
            projects, collaboration opportunities, or any
            professional inquiries.
        </p>

    </div>

    <br>

    <form id="contactForm">

        <input
            type="text"
            id="name"
            placeholder="Enter Your Name"
        >

        <input
            type="email"
            id="email"
            placeholder="Enter Your Email"
        >

        <textarea
            id="message"
            rows="5"
            placeholder="Enter Your Message"
        ></textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

</div>

<footer>
